# ============================================================
# Docker 环境配置（spring.profiles.active=docker）
# 所有值均从环境变量读取，由 docker-compose.yml 注入
# ============================================================

server:
  port: 3060

agentscope:
  agui:
    path-prefix: /apboa/agui
    cors-enabled: true
    enable-reasoning: true
    server-side-memory: true
    max-thread-sessions: 1000

spring:
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis}
      database: ${REDIS_DATABASE:7}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:apboa}?useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-on-borrow: false
      test-on-return: false
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000

jwt:
  secret: ${JWT_SECRET:ZJr8c2xF0y5b7yM+1H9v9cGZq6nZ5e0k5r3Cw7H8vJQ=}

rag:
  store: ${VECTOR_STORE_TYPE:pgvector}
  pgvector:
    url: jdbc:postgresql://${PG_HOST:pgvector}:${PG_PORT:5432}/${PG_DATABASE:apboa_vector}
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  milvus:
    host: ${MILVUS_HOST:milvus}
    port: ${MILVUS_PORT:19530}
    username:
    password:
    token:
    database: ${MILVUS_DATABASE:default}
  qdrant:
    host: ${QDRANT_HOST:qdrant}
    port: ${QDRANT_PORT:6334}
    api-key:
    collection-prefix: apboa_rag
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://apboa-elasticsearch:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
    api-key: ${ELASTICSEARCH_API_KEY:}
    index-prefix: ${ELASTICSEARCH_INDEX_PREFIX:apboa_rag}
    connect-timeout: ${ELASTICSEARCH_CONNECT_TIMEOUT:5000}
    socket-timeout: ${ELASTICSEARCH_SOCKET_TIMEOUT:60000}
  weaviate:
    host: ${WEAVIATE_HOST:weaviate}
    port: ${WEAVIATE_PORT:8080}
    scheme: ${WEAVIATE_SCHEME:http}
    api-key: ${WEAVIATE_API_KEY:}
    class-prefix: ${WEAVIATE_CLASS_PREFIX:ApboaRag}

mybatis-plus:
  mapper-locations: classpath*:com/hxh/apboa/**/mapper/**/*.xml
  type-aliases-package: com.hxh.apboa.**.entity
  global-config:
    db-config:
      id-type: assign_id
      update-strategy: not_null
      insert-strategy: not_null
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    map-underscore-to-camel-case: true
    call-setters-on-nulls: true
