server {
    listen       80;
    server_name  localhost;

    client_max_body_size 100m;

    # 字符集
    charset utf-8;

    # Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_vary on;

    # ==================== 前端静态资源 ====================
    # 主应用：/web/ 路径
    location /web/ {
        alias /usr/share/nginx/html/web/;
        index index.html;
        try_files $uri $uri/ /web/index.html;
    }

    # /doc.html路径重定向到 /web/doc/doc.html
    location = /doc.html {
        return 301 /web/doc/doc.html;
    }

    # 根路径重定向到 /web/
    location = / {
        return 301 /web/;
    }

    # ==================== API 代理 ====================
    # 主路径：/web/api/ → 后端（由 ApiPathRewriteFilter 剥离前缀）
    location /web/api/ {
        proxy_pass http://apboa-backend:3060/web/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # 兼容路径：/api/ → 后端
    location /api/ {
        proxy_pass http://apboa-backend:3060/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # ==================== AgentScope AG-UI ====================
    location /apboa/agui/ {
        proxy_pass http://apboa-backend:3060/apboa/agui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
