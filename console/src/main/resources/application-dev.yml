server:
  port: 3060

agentscope:
  agui:
    path-prefix: /apboa/agui
    cors-enabled: true
    enable-reasoning: true
    server-side-memory: true
    max-thread-sessions: 1000
    sse-timeout: 1800000  # SSE 超时时间（毫秒），默认 30 分钟
#  a2a:
#    server:
#      enabled: false
#      card:
#        name: my_assistant
#        description: 智能助手
#    nacos:
#      server-addr: 192.168.174.130:8848
#      username: nacos
#      password: nacos

spring:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 7
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/apboa?useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-on-borrow: false
      test-on-return: false
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000

jwt:
  secret: ${JWT_SECRET:ZJr8c2xF0y5b7yM+1H9v9cGZq6nZ5e0k5r3Cw7H8vJQ=}

rag:
  store: pgvector  # pgvector | milvus | qdrant | elasticsearch |weaviate，向量存储类型
  pgvector:
    url: jdbc:postgresql://127.0.0.1:5432/apboa_vector
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  milvus:
    host: 127.0.0.1
    port: 19530
    username: YOUR_USERNAME   # Milvus 用户名，自建部署留空
    password: YOUR_PASSWORD   # Milvus 密码，自建部署留空
    token: YOUR_TOKEN         # Milvus SaaS 认证 token，与用户名/密码二选一
    database: default  # 默认库名
  qdrant:
    host: localhost
    port: 6334
    api-key: YOUR_API_KEY
    collection-prefix: apboa_rag
  elasticsearch:
    uris: http://127.0.0.1:9200
    username:
    password:
    api-key:
    index-prefix: apboa_rag
    connect-timeout: 5000
    socket-timeout: 60000
  weaviate:
    host: localhost
    port: 8080
    scheme: http
    api-key: YOUR_API_KEY
    class-prefix: ApboaRag

# 联网搜索配置
apboa:
  search:
    # 搜索 API 类型：tavily（默认，推荐）、duckduckgo（免费）、searxng（自托管）、serpapi（付费）、google（付费）
    api-type: tavily
    # Tavily API Key（仅 tavily 类型需要，申请地址：https://tavily.com）
    tavily-key: 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
    # SearXNG 实例地址（仅 searxng 类型需要，推荐自建：docker run -d -p 8888:8080 searxng/searxng）
    searxng-url:
    # SerpAPI Key（仅 serpapi 类型需要，申请地址：https://serpapi.com）
    serpapi-key:
    # Google Custom Search API Key（仅 google 类型需要）
    google-api-key:
    # Google Custom Search Engine ID（仅 google 类型需要）
    google-cx:

mybatis-plus:
  mapper-locations: classpath*:com/hxh/apboa/**/mapper/**/*.xml
  type-aliases-package: com.hxh.apboa.**.entity
  global-config:
    db-config:
      id-type: assign_id
      update-strategy: not_null
      insert-strategy: not_null
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    #    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    call-setters-on-nulls: true

