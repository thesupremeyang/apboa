<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apboa Agent 助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f7fb;
    color: #1f2937;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* 顶部标题栏 */
.header {
    background: #ffffff;
    color: #1f2937;
    padding: 0 24px;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #e5e7eb;
    flex-shrink: 0;
}

.header h1 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0;
}

.header h1 .icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: #2f6df6;
    color: #ffffff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
}

.header-actions { display: flex; gap: 8px; }

.btn-clear {
    background: #ffffff;
    border: 1px solid #d1d5db;
    color: #374151;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.btn-clear:hover {
    border-color: #2f6df6;
    color: #2f6df6;
    background: #f8fbff;
}

/* 聊天区域 */
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 1180px;
    width: 100%;
    margin: 0 auto;
}

/* 欢迎消息 */
.welcome {
    padding: 28px 0 12px;
    color: #4b5563;
}
.welcome h2 {
    font-size: 20px;
    margin-bottom: 10px;
    color: #111827;
    font-weight: 600;
    letter-spacing: 0;
}
.welcome p { font-size: 14px; line-height: 1.8; }
.welcome .examples {
    margin-top: 18px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
}
.welcome .example-btn {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    padding: 11px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: #374151;
    text-align: left;
    transition: border-color 0.2s, box-shadow 0.2s, color 0.2s;
}
.welcome .example-btn:hover {
    border-color: #2f6df6;
    color: #1d4ed8;
    box-shadow: 0 1px 4px rgba(47,109,246,0.12);
}

/* 消息气泡 */
.message {
    display: flex;
    gap: 12px;
    max-width: 82%;
    animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
}

.message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
}

.message .avatar {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
}

.message.user .avatar { background: #2f6df6; color: white; }
.message.ai .avatar {
    background: #ffffff;
    color: #4b5563;
    border: 1px solid #d9dee8;
}

.message .bubble {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.7;
    word-break: break-word;
    overflow-wrap: anywhere;
}

.message.user .bubble {
    background: #2f6df6;
    color: white;
    border-bottom-right-radius: 3px;
}

.message.ai .bubble {
    background: white;
    color: #1f2937;
    border: 1px solid #e5e7eb;
    border-bottom-left-radius: 3px;
}

/* AI 消息中的 Markdown 样式 */
.message.ai .bubble p { margin-bottom: 8px; }
.message.ai .bubble p:last-child { margin-bottom: 0; }
.message.ai .bubble code {
    background: #f3f4f6;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
    font-size: 13px;
    color: #b42318;
}
.message.ai .bubble pre {
    background: #f8fafc;
    color: #111827;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #e5e7eb;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
    line-height: 1.5;
}
.message.ai .bubble pre code {
    background: none;
    color: inherit;
    padding: 0;
}
.message.ai .bubble table {
    border-collapse: collapse;
    width: 100%;
    margin: 8px 0;
    font-size: 13px;
}
.message.ai .bubble th, .message.ai .bubble td {
    border: 1px solid #e5e7eb;
    padding: 6px 10px;
    text-align: left;
}
.message.ai .bubble th { background: #f8fafc; font-weight: 600; }
.message.ai .bubble ul, .message.ai .bubble ol {
    padding-left: 20px;
    margin: 4px 0;
}
.message.ai .bubble li { margin: 2px 0; }
.message.ai .bubble h3, .message.ai .bubble h4 {
    margin: 12px 0 6px;
    color: #111827;
}
.message.ai .bubble blockquote {
    border-left: 3px solid #2f6df6;
    padding-left: 12px;
    color: #4b5563;
    margin: 8px 0;
}
.message.ai .bubble strong { color: #111827; }

/* 工具调用提示 */
.tool-calls {
    margin-top: 8px;
    padding: 7px 10px;
    background: #f8fafc;
    border-radius: 6px;
    font-size: 12px;
    color: #475569;
    border: 1px solid #e2e8f0;
}
.tool-calls::before {
    content: "工具 ";
    color: #1d4ed8;
    font-weight: 600;
}

/* 加载动画 */
.loading {
    display: flex;
    gap: 12px;
    max-width: 82%;
    animation: fadeIn 0.2s ease;
}
.loading .avatar {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: #ffffff;
    border: 1px solid #d9dee8;
    color: #4b5563;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;
}
.loading .dots {
    background: white;
    padding: 12px 18px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    border-bottom-left-radius: 3px;
    display: flex;
    gap: 6px;
    align-items: center;
}
.loading .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #cbd5e1;
    animation: bounce 1.4s infinite ease-in-out;
}
.loading .dot:nth-child(1) { animation-delay: 0s; }
.loading .dot:nth-child(2) { animation-delay: 0.2s; }
.loading .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); background: #cbd5e1; }
    40% { transform: scale(1); background: #2f6df6; }
}

/* 输入区域 */
.input-area {
    padding: 14px 24px;
    background: white;
    border-top: 1px solid #e5e7eb;
    flex-shrink: 0;
}

.input-wrapper {
    display: flex;
    gap: 10px;
    max-width: 1180px;
    margin: 0 auto;
}

.input-wrapper textarea {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
}
.input-wrapper textarea:focus {
    border-color: #2f6df6;
    box-shadow: 0 0 0 3px rgba(47,109,246,0.12);
}

.btn-send {
    background: #2f6df6;
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s, opacity 0.2s;
    white-space: nowrap;
}
.btn-send:hover { background: #245bd6; }
.btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

/* 响应式 */
@media (max-width: 600px) {
    .header { padding: 0 16px; }
    .header h1 { font-size: 16px; }
    .chat-container { padding: 14px; }
    .message { max-width: 95%; }
    .input-area { padding: 12px; }
    .input-wrapper { align-items: flex-end; }
    .btn-send { padding: 10px 16px; }
}
</style>
</head>
<body>

<div class="header">
    <h1><span class="icon">A</span> Apboa Agent 助手</h1>
    <div class="header-actions">
        <button class="btn-clear" onclick="clearChat()">清空对话</button>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
        <h2>Apboa Agent 助手</h2>
        <p>通过自然语言创建智能体、查找并上传技能，或生成新的平台技能。</p>
        <div class="examples">
            <button class="example-btn" onclick="sendExample(this)">帮我创建一个代码审查智能体</button>
            <button class="example-btn" onclick="sendExample(this)">搜索 Docker 部署相关的 skill</button>
            <button class="example-btn" onclick="sendExample(this)">创建一个 SQL 查询生成器 skill</button>
            <button class="example-btn" onclick="sendExample(this)">查看平台上的智能体列表</button>
        </div>
    </div>
</div>

<div class="input-area">
    <div class="input-wrapper">
        <textarea id="messageInput" placeholder="输入消息... (Enter 发送，Shift+Enter 换行)" rows="1"></textarea>
        <button class="btn-send" id="btnSend" onclick="sendMessage()">发送</button>
    </div>
</div>

<script>
const chatContainer = document.getElementById('chatContainer');
const messageInput = document.getElementById('messageInput');
const btnSend = document.getElementById('btnSend');
let isLoading = false;

// 自动调整输入框高度
messageInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Enter 发送，Shift+Enter 换行
messageInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

function sendExample(btn) {
    messageInput.value = btn.textContent;
    sendMessage();
}

async function sendMessage() {
    const message = messageInput.value.trim();
    if (!message || isLoading) return;

    // 隐藏欢迎消息
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.style.display = 'none';

    // 显示用户消息
    appendMessage('user', message);
    messageInput.value = '';
    messageInput.style.height = 'auto';

    // 显示加载状态
    isLoading = true;
    btnSend.disabled = true;
    const loadingEl = showLoading();

    try {
        const resp = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
        });

        const data = await resp.json();
        loadingEl.remove();

        // 显示 AI 回复
        let reply = data.reply || '(无回复)';
        let toolCalls = data.toolCalls || [];

        appendMessage('ai', reply, toolCalls);

    } catch (e) {
        loadingEl.remove();
        appendMessage('ai', '请求失败: ' + e.message);
    }

    isLoading = false;
    btnSend.disabled = false;
    messageInput.focus();
}

function appendMessage(role, content, toolCalls) {
    const div = document.createElement('div');
    div.className = 'message ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '我' : 'A';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'ai') {
        bubble.innerHTML = renderMarkdown(content);
    } else {
        bubble.textContent = content;
    }

    // 工具调用提示
    if (toolCalls && toolCalls.length > 0) {
        const tc = document.createElement('div');
        tc.className = 'tool-calls';
        tc.textContent = '调用了工具: ' + [...new Set(toolCalls)].join(', ');
        bubble.appendChild(tc);
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    chatContainer.appendChild(div);
    scrollToBottom();
}

function showLoading() {
    const div = document.createElement('div');
    div.className = 'loading';
    div.innerHTML = `
        <div class="avatar">A</div>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    `;
    chatContainer.appendChild(div);
    scrollToBottom();
    return div;
}

function scrollToBottom() {
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

async function clearChat() {
    try {
        await fetch('/api/clear', { method: 'POST' });
    } catch (e) {}

    chatContainer.innerHTML = `
        <div class="welcome" id="welcome">
            <h2>Apboa Agent 助手</h2>
            <p>通过自然语言创建智能体、查找并上传技能，或生成新的平台技能。</p>
            <div class="examples">
                <button class="example-btn" onclick="sendExample(this)">帮我创建一个代码审查智能体</button>
                <button class="example-btn" onclick="sendExample(this)">搜索 Docker 部署相关的 skill</button>
                <button class="example-btn" onclick="sendExample(this)">创建一个 SQL 查询生成器 skill</button>
                <button class="example-btn" onclick="sendExample(this)">查看平台上的智能体列表</button>
            </div>
        </div>
    `;
}

// ========== 简易 Markdown 渲染 ==========
function renderMarkdown(text) {
    // 转义 HTML
    let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

    // 代码块 ```...```
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
        return '<pre><code>' + code.trim() + '</code></pre>';
    });

    // 行内代码 `...`
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // 表格
    html = html.replace(/((?:\|[^\n]+\|\n)+)/g, function(tableBlock) {
        const rows = tableBlock.trim().split('\n').filter(r => r.trim());
        if (rows.length < 2) return tableBlock;

        let result = '<table>';
        rows.forEach((row, i) => {
            // 跳过分隔行 |---|---|
            if (/^\|[\s\-:|]+\|$/.test(row.trim())) return;

            const cells = row.split('|').filter((c, j, arr) => j > 0 && j < arr.length - 1);
            const tag = i === 0 ? 'th' : 'td';
            result += '<tr>' + cells.map(c => '<' + tag + '>' + c.trim() + '</' + tag + '>').join('') + '</tr>';
        });
        result += '</table>';
        return result;
    });

    // 标题 ### / ####
    html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');

    // 粗体 **...**
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // 引用 > ...
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

    // 无序列表
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

    // 有序列表
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

    // 分隔线 ---
    html = html.replace(/^---+$/gm, '<hr>');

    // 换行
    html = html.replace(/\n\n/g, '</p><p>');
    html = html.replace(/\n/g, '<br>');
    html = '<p>' + html + '</p>';

    // 清理空段落
    html = html.replace(/<p><\/p>/g, '');
    html = html.replace(/<p>(<h[34]>)/g, '$1');
    html = html.replace(/(<\/h[34]>)<\/p>/g, '$1');
    html = html.replace(/<p>(<pre>)/g, '$1');
    html = html.replace(/(<\/pre>)<\/p>/g, '$1');
    html = html.replace(/<p>(<table>)/g, '$1');
    html = html.replace(/(<\/table>)<\/p>/g, '$1');
    html = html.replace(/<p>(<ul>)/g, '$1');
    html = html.replace(/(<\/ul>)<\/p>/g, '$1');
    html = html.replace(/<p>(<blockquote>)/g, '$1');
    html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
    html = html.replace(/<p>(<hr>)<\/p>/g, '$1');

    return html;
}

// 页面加载后聚焦输入框
messageInput.focus();
</script>
</body>
</html>
